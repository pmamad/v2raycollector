# Triggers UpdateConfigs on a schedule (backup if schedule on main.yml does not fire).
name: CollectorScheduler

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  trigger-collect:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Run UpdateConfigs workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "main.yml",
              ref: "main",
            });
            core.info("Triggered UpdateConfigs via workflow_dispatch");
