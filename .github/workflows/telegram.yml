name: SendToTelegramChannel

on:
  workflow_dispatch:
  workflow_run:
    workflows: [UpdateConfigs]
    types: [completed]

concurrency:
  group: telegram-configs-send
  cancel-in-progress: false

jobs:
  sendNewConfigs:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Collect new configs
        id: collect
        run: |
          set -euo pipefail

          PROTOCOL_FILES=(
            category/vless.txt
            category/vmess.txt
            category/trojan.txt
            category/ss.txt
            category/wireguard.txt
          )

          mkdir -p .workflow
          : > .workflow/new_configs.txt

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            BEFORE_SHA="${{ github.event.workflow_run.head_sha }}"
            AFTER_SHA="$(git rev-parse HEAD)"
            echo "Collector commit range: ${BEFORE_SHA} -> ${AFTER_SHA}"

            if [ "$BEFORE_SHA" = "$AFTER_SHA" ]; then
              echo "No new commit from UpdateConfigs (nothing to send)."
              echo "count=0" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            DIFF_FROM="$BEFORE_SHA"
            DIFF_TO="$AFTER_SHA"
          else
            if ! git rev-parse HEAD~1 >/dev/null 2>&1; then
              echo "No previous commit to diff against."
              echo "count=0" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            DIFF_FROM="HEAD~1"
            DIFF_TO="HEAD"
            echo "Manual diff range: ${DIFF_FROM} -> ${DIFF_TO}"
          fi

          for file in "${PROTOCOL_FILES[@]}"; do
            [ -f "$file" ] || continue
            git diff --unified=0 "$DIFF_FROM" "$DIFF_TO" -- "$file" \
              | grep '^+' \
              | grep -v '^+++' \
              | sed 's/^+//' \
              >> .workflow/new_configs.txt || true
          done

          if [ -s .workflow/new_configs.txt ]; then
            sort -u .workflow/new_configs.txt -o .workflow/new_configs.txt
          fi

          count=$(wc -l < .workflow/new_configs.txt | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Found $count new config(s)."

          if [ "$count" = "0" ]; then
            echo "Changed files in range:"
            git diff --name-only "$DIFF_FROM" "$DIFF_TO" -- category/ || true
          fi

      - name: Send new configs to Telegram
        if: steps.collect.outputs.count != '0'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail

          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Missing TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID secrets."
            exit 1
          fi

          send_message() {
            local payload
            payload=$(jq -n \
              --arg chat_id "$TELEGRAM_CHAT_ID" \
              --arg text "$1" \
              '{chat_id: $chat_id, text: $text, disable_web_page_preview: true}')

            local response http_code body
            response=$(curl -sS -w "\n%{http_code}" -X POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$payload")
            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | sed '$d')

            if [ "$http_code" != "200" ] || [ "$(echo "$body" | jq -r '.ok')" != "true" ]; then
              echo "Telegram API error (HTTP $http_code): $body"
              return 1
            fi
          }

          header=$'🆕 کانفیگ\u200cهای جدید\n\n'
          max_chars=3900
          message="$header"
          sent=0

          while IFS= read -r line || [ -n "$line" ]; do
            [ -z "$line" ] && continue

            addition="${line}"$'\n\n'
            if [ $(( ${#message} + ${#addition} )) -gt "$max_chars" ]; then
              send_message "$message"
              sent=$((sent + 1))
              sleep 1
              message="$header$addition"
            else
              message+="$addition"
            fi
          done < .workflow/new_configs.txt

          if [ "$message" != "$header" ]; then
            send_message "$message"
            sent=$((sent + 1))
          fi

          footer=$'\n\n@v2rayng_free | #v2ray #vmess #vless'
          summary="${header}تعداد ${sent} پیام ارسال شد.${footer}"
          send_message "$summary"

          echo "Sent $sent message batch(es) to Telegram."
